name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run cargo check
        run: cargo check --all-targets --all-features

      - name: Run tests
        run: cargo test --all-features --verbose

  msrv:
    name: MSRV (1.70)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 1.70
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.70"

      # Checks that the library itself compiles on MSRV.
      # Tests are not run here because dev-dependencies (criterion, proptest)
      # and optional ecosystem crates (chrono, time) pull in transitive
      # dependencies that require editions newer than what Rust 1.70 supports.
      # Correctness is covered by the Test Suite job on stable.
      - name: Check library on MSRV
        run: cargo check --features std,english,russian,polish

  minimal:
    name: Minimal feature check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check no_std-compatible build
        run: cargo check --no-default-features

  feature-matrix:
    name: Feature matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: std-only
            args: --no-default-features --features std
          - label: alloc-placeholder
            args: --no-default-features --features alloc
          - label: english-placeholder
            args: --no-default-features --features english
          - label: russian-locale
            args: --no-default-features --features russian
          - label: polish-locale
            args: --no-default-features --features polish
          - label: chrono-placeholder
            args: --no-default-features --features chrono
          - label: time-placeholder
            args: --no-default-features --features time
          - label: chrono-time-placeholders
            args: --no-default-features --features chrono,time

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check ${{ matrix.label }}
        run: cargo check ${{ matrix.args }}

  fmt:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy (strict mode)
        run: cargo clippy --all-targets --all-features -- -D warnings
