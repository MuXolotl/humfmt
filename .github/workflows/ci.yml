name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --all-features

      - name: Cargo test
        run: cargo test --all-features